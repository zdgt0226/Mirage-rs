name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    # Pin to 22.04 (glibc 2.35) so gnu binaries stay compatible with
    # Debian 12 / Ubuntu 22.04+ / RHEL 9+. ubuntu-latest moved to 24.04
    # (glibc 2.39) in 2025, which would silently raise our floor.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
          - target: x86_64-unknown-linux-musl
            arch: amd64-musl
          - target: aarch64-unknown-linux-musl
            arch: arm64-musl

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要全 tag 历史给 build.rs 的 git describe 用

      - name: Verify Cargo.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "Tag:        $TAG_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::版本不一致: tag v$TAG_VERSION ≠ Cargo.toml $CARGO_VERSION"
            echo "::error::请先 bump Cargo.toml version 再打 tag"
            exit 1
          fi
          echo "✓ 版本一致"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm llvm-dev libclang-dev protobuf-compiler libbpf-dev linux-headers-generic
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            sudo apt-get install -y musl-tools
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            # We use an external toolchain or musl-cross for aarch64-musl
            # But the easiest way for musl cross is using cross-rs
            echo "We will use cross-rs for musl"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for musl cross-compilation)
        if: contains(matrix.target, 'musl')
        run: cargo install cross --git https://github.com/cross-rs/cross

      # === BPF compilation (shared by all targets) ===
      # Compile BPF objects on the runner with the runner's clang BEFORE running
      # cargo/cross build. This guarantees that:
      #   1) ebpf-src/*.elf is valid (overwrites any stale committed fallback)
      #   2) Even if cross container lacks clang and build.rs falls back to the
      #      committed path, the fallback content is fresh and valid.
      #   3) gnu build's build.rs has the same baseline (host clang) — eliminating
      #      pre-built binary divergence between runs.
      - name: Compile BPF objects (explicit)
        run: |
          set -euo pipefail
          uname_m=$(uname -m)
          mkdir -p ebpf-src
          for src in sockmap dns_xdp transparent; do
              echo "=== Compiling ebpf-src/${src}.c ==="
              clang -O2 -g -target bpf \
                  -I/usr/include/${uname_m}-linux-gnu \
                  -c ebpf-src/${src}.c \
                  -o ebpf-src/${src}.elf
              llvm-strip --strip-debug ebpf-src/${src}.elf
              # Hard verification — fail CI if any ELF is broken
              file ebpf-src/${src}.elf | tee /tmp/file_${src}.txt
              if ! grep -q "ELF.*eBPF" /tmp/file_${src}.txt; then
                  echo "FATAL: ebpf-src/${src}.elf is not a valid BPF ELF" >&2
                  exit 1
              fi
              readelf -h ebpf-src/${src}.elf | grep -E "Machine:.*Linux BPF" \
                  || { echo "FATAL: wrong machine type for ${src}.elf" >&2; exit 1; }
              size=$(stat -c%s ebpf-src/${src}.elf)
              if [ "$size" -lt 200 ]; then
                  echo "FATAL: ebpf-src/${src}.elf suspiciously small ($size bytes)" >&2
                  exit 1
              fi
              echo "✓ ${src}.elf: $size bytes, valid BPF ELF"
          done

      - name: Build Binary (Standard)
        if: "!contains(matrix.target, 'musl')"
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --release --target ${{ matrix.target }} --features ebpf
          cp target/${{ matrix.target }}/release/mirage mirage-rs-${{ matrix.arch }}

      - name: Build Binary (Musl via Cross)
        if: contains(matrix.target, 'musl')
        run: |
          set -euo pipefail
          cross build --release --target ${{ matrix.target }} --features ebpf
          cp target/${{ matrix.target }}/release/mirage mirage-rs-${{ matrix.arch }}

      # Post-build: confirm the resulting binary actually embeds 3 ELF blobs
      - name: Verify embedded BPF ELFs in artifact
        run: |
          set -euo pipefail
          artifact="mirage-rs-${{ matrix.arch }}"
          echo "=== ELF magic occurrences in $artifact (expect ≥ 3 for sockmap/dns_xdp/transparent) ==="
          # ELF magic = \x7fELF. Use grep -aob to find all occurrences.
          count=$(grep -aoc $'\x7fELF' "$artifact" || echo 0)
          echo "Found $count ELF magic occurrences"
          if [ "$count" -lt 3 ]; then
              echo "FATAL: artifact missing embedded BPF ELFs (found $count, expected ≥ 3)" >&2
              exit 1
          fi
          echo "✓ artifact embeds ≥ 3 ELF blobs"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirage-rs-${{ matrix.arch }}
          path: mirage-rs-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/mirage-rs-amd64/mirage-rs-amd64
            artifacts/mirage-rs-arm64/mirage-rs-arm64
            artifacts/mirage-rs-amd64-musl/mirage-rs-amd64-musl
            artifacts/mirage-rs-arm64-musl/mirage-rs-arm64-musl
          generate_release_notes: true
